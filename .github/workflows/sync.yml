name: Auto Sync from LazyVim

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/LazyVim/LazyVim.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
