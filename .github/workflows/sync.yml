name: Force Sync Fork

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Debug - show current branches
        run: |
          echo "Current branches:"
          git branch -a
          echo "Current remote:"
          git remote -v

      - name: Add upstream
        run: git remote add upstream https://github.com/LazyVim/LazyVim.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Show upstream commits
        run: |
          echo "Upstream latest 5 commits:"
          git log upstream/main -5 --oneline

      - name: Force reset to upstream
        run: |
          git checkout main || git checkout -b main
          git reset --hard upstream/main

      - name: Force push
        run: git push origin main --force

      - name: Verify
        run: |
          echo "Current commit after sync:"
          git log -1 --oneline
