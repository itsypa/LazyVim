name: Force Sync Fork from LazyVim/LazyVim

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Force sync with upstream
        run: |
          git remote add upstream https://github.com/LazyVim/LazyVim.git
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
