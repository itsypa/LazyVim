name: Sync Fork from LazyVim/LazyVim

on:
  schedule:
    # 每天 UTC 时间 0 点运行（北京时间 8 点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream repository
        run: git remote add upstream https://github.com/LazyVim/LazyVim.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Checkout main branch
        run: git checkout main

      - name: Merge upstream/main into main
        run: git merge upstream/main --no-edit

      - name: Push to your fork
        run: git push origin main
